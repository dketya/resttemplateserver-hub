apiVersion: apps/v1
kind: Deployment
metadata:
  name: resttemplateserver-hub
  labels:
    app: resttemplateserver-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resttemplateserver-hub
  template:
    metadata:
      labels:
        app: resttemplateserver-hub
    spec:
      containers:
        - name: resttemplateserver-hub
          image: dketya/resttemplateserver-hub:239770f8a07dbe8301b4a78e7ca52c9fa1624172
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/bookdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root1234

---
apiVersion: v1
kind: Service
metadata:
  name: resttemplateserver-hub
spec:
  type: NodePort
  selector:
    app: resttemplateserver-hub
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30111
